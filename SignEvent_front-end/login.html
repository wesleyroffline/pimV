<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignEvent | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page-center">
        <section class="card">
            <h1 class="title">Acessar SignEvent</h1>
            <p class="subtitle">Autenticação delegada ao back-end em C#.</p>

            <form id="loginForm" novalidate>
                <div class="field">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" autocomplete="username" required>
                </div>

                <div class="field">
                    <label for="password">Senha</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required>
                </div>

                <p id="errorMessage" class="error-message" aria-live="polite"></p>

                <button id="submitButton" class="btn btn-primary" type="submit">Entrar</button>
            </form>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="login.js"></script>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget("https://vlibras.gov.br/app");
    </script>
</body>
</html>
