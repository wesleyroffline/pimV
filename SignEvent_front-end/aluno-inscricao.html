<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignEvent | Inscrição do Aluno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-role="ALUNO">
    <header class="app-header">
        <div>
            <h1 class="title">Inscrição em Atividades</h1>
            <p class="subtitle">Selecione atividades e confirme sua participação com acessibilidade.</p>
        </div>
        <div class="header-actions">
            <span id="roleDisplay" class="badge"></span>
            <button id="logoutButton" class="btn btn-secondary" type="button">Sair</button>
        </div>
    </header>

    <main class="page-grid">
        <nav class="card side-menu" aria-label="Navegação do aluno">
            <h2 class="section-title">Menu</h2>
            <a class="menu-link" href="aluno.html">Página Inicial</a>
            <a class="menu-link" href="aluno-programacao.html">Programação</a>
            <a class="menu-link active" href="aluno-inscricao.html">Inscrição</a>
            <a class="menu-link" href="aluno-area.html">Área do Participante</a>
            <a class="menu-link" href="aluno-certificados.html">Consulta de Certificados</a>
        </nav>

        <section class="content-stack">
            <article class="card">
                <h2 class="section-title">Formulário de inscrição</h2>
                <form class="stack-form" aria-label="Formulário de inscrição em atividades">
                    <label for="atividade">Atividade principal</label>
                    <select id="atividade" name="atividade">
                        <option>Oficina de APIs em C#</option>
                        <option>Laboratório de UX Inclusiva</option>
                        <option>Bootcamp de Banco de Dados</option>
                    </select>

                    <label for="necessidade">Necessidade de acessibilidade</label>
                    <select id="necessidade" name="necessidade">
                        <option>Intérprete de Libras</option>
                        <option>Legenda em tempo real</option>
                        <option>Sem necessidade adicional</option>
                    </select>

                    <button class="btn btn-primary" type="button">Confirmar inscrição</button>
                </form>
            </article>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="protected.js"></script>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget("https://vlibras.gov.br/app");
    </script>
</body>
</html>
