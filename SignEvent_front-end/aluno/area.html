<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignEvent | Área do Participante</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body data-role="ALUNO">
    <header class="app-header">
        <div>
            <h1 class="title">Área do Participante</h1>
            <p class="subtitle">Acompanhe suas inscrições e atualizações pessoais.</p>
        </div>
        <div class="header-actions">
            <span id="roleDisplay" class="badge"></span>
            <button id="logoutButton" class="btn btn-secondary" type="button">Sair</button>
        </div>
    </header>

    <main class="page-grid">
        <nav class="card side-menu" aria-label="Navegação do aluno">
            <h2 class="section-title">Menu</h2>
            <a class="menu-link" href="/aluno/">Página Inicial</a>
            <a class="menu-link" href="/aluno/programacao.html">Programação</a>
            <a class="menu-link" href="/aluno/inscricao.html">Inscrição</a>
            <a class="menu-link active" href="/aluno/area.html">Área do Participante</a>
            <a class="menu-link" href="/aluno/certificados.html">Consulta de Certificados</a>
        </nav>

        <section class="content-stack">
            <article class="card">
                <h2 class="section-title">Resumo acadêmico</h2>
                <ul class="accessible-list">
                    <li>Atividades inscritas: 3</li>
                    <li>Atividades concluídas: 2</li>
                    <li>Solicitações de acessibilidade atendidas: 100%</li>
                </ul>
            </article>
        </section>
    </main>

    <script src="/config.js"></script>
    <script src="/auth.js"></script>
    <script src="/protected.js"></script>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget("https://vlibras.gov.br/app");
    </script>

</html>
