<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignEvent | Certificados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-role="ALUNO">
    <header class="app-header">
        <div>
            <h1 class="title">Consulta de Certificados</h1>
            <p class="subtitle">Busque certificados emitidos por código de validação.</p>
        </div>
        <div class="header-actions">
            <span id="roleDisplay" class="badge"></span>
            <button id="logoutButton" class="btn btn-secondary" type="button">Sair</button>
        </div>
    </header>

    <main class="page-grid">
        <nav class="card side-menu" aria-label="Navegação do aluno">
            <h2 class="section-title">Menu</h2>
            <a class="menu-link" href="aluno.html">Página Inicial</a>
            <a class="menu-link" href="aluno-programacao.html">Programação</a>
            <a class="menu-link" href="aluno-inscricao.html">Inscrição</a>
            <a class="menu-link" href="aluno-area.html">Área do Participante</a>
            <a class="menu-link active" href="aluno-certificados.html">Consulta de Certificados</a>
        </nav>

        <section class="content-stack">
            <article class="card">
                <h2 class="section-title">Validação de certificado</h2>
                <form class="stack-form" aria-label="Consulta de certificado">
                    <label for="codigo">Código do certificado</label>
                    <input id="codigo" name="codigo" type="text" placeholder="Ex.: AB12CD34">
                    <button class="btn btn-primary" type="button">Consultar</button>
                </form>
            </article>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="protected.js"></script>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget("https://vlibras.gov.br/app");
    </script>
</body>
</html>
