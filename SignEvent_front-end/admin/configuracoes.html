<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignEvent | Configurações</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body data-role="ADMIN">
    <header class="app-header">
        <div>
            <h1 class="title">Configurações do Evento</h1>
            <p class="subtitle">Personalize os parâmetros e dados gerais do evento.</p>
        </div>
        <div class="header-actions">
            <span id="roleDisplay" class="badge"></span>
            <button id="logoutButton" class="btn btn-secondary" type="button">Sair</button>
        </div>
    </header>

    <main class="page-grid">
        <nav class="card side-menu" aria-label="Navegação administrativa">
            <h2 class="section-title">Menu Admin</h2>
            <a class="menu-link" href="/admin/">Painel</a>
            <a class="menu-link" href="/admin/inscritos.html">Inscritos</a>
            <a class="menu-link" href="/admin/atividades.html">Atividades</a>
            <a class="menu-link" href="/admin/certificados.html">Certificados</a>
            <a class="menu-link active" href="/admin/configuracoes.html">Configurações</a>
        </nav>

        <section class="content-stack">
            <article class="card">
                <h2 class="section-title">Informações gerais do evento</h2>
                <form class="stack-form" aria-label="Configurações do evento">
                    <label for="nomeEvento">Nome do evento</label>
                    <input id="nomeEvento" type="text" value="PIM V - Ambiente Virtual para Eventos Acadêmicos de TI">
                    
                    <label for="dataInicio">Data de início</label>
                    <input id="dataInicio" type="date" value="2026-04-05">
                    
                    <label for="dataFim">Data de término</label>
                    <input id="dataFim" type="date" value="2026-04-05">
                    
                    <label for="local">Local/Descrição</label>
                    <input id="local" type="text" value="Campus Virtual - Transmissão online">
                    
                    <label for="descricaoEvento">Descrição completa</label>
                    <textarea id="descricaoEvento" rows="4" placeholder="Descreva os objetivos e informações principais do evento..."></textarea>
                    
                    <button class="btn btn-primary" type="button">Salvar alterações</button>
                </form>
            </article>

            <article class="card">
                <h2 class="section-title">Configurações de acessibilidade</h2>
                <form class="stack-form" aria-label="Acessibilidade">
                    <label for="librasObrigatoria">
                        <input id="librasObrigatoria" type="checkbox"> Intérprete de Libras obrigatório em todas as palestras
                    </label>
                    
                    <label for="legendaObrigatoria">
                        <input id="legendaObrigatoria" type="checkbox"> Legenda em tempo real obrigatória
                    </label>
                    
                    <label for="vlibrasAtivo">
                        <input id="vlibrasAtivo" type="checkbox" checked> VLibras ativo no sistema
                    </label>
                    
                    <label for="resourcesUrl">URL de recursos de acessibilidade</label>
                    <input id="resourcesUrl" type="url" placeholder="https://..." value="https://vlibras.gov.br/">
                    
                    <button class="btn btn-primary" type="button">Salvar configurações</button>
                </form>
            </article>

            <article class="card">
                <h2 class="section-title">Backup e exportação</h2>
                <div class="stack-form">
                    <button class="btn btn-primary" type="button">Exportar inscritos (CSV)</button>
                    <button class="btn btn-primary" type="button">Exportar certificados (JSON)</button>
                    <button class="btn btn-secondary" type="button">Criar backup completo</button>
                </div>
            </article>
        </section>
    </main>

    <script src="/config.js"></script>
    <script src="/auth.js"></script>
    <script src="/protected.js"></script>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget("https://vlibras.gov.br/app");
    </script>
</body>
</html>
