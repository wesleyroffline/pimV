<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignEvent | Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-role="ADMIN">
    <main class="dashboard">
        <section class="card">
            <h1 class="title">Painel Administrativo</h1>
            <p class="subtitle">Bem-vindo, <strong id="usernameDisplay"></strong>.</p>
            <span id="roleDisplay" class="badge"></span>
            <button id="logoutButton" class="btn btn-secondary" type="button">Sair</button>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="protected.js"></script>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget("https://vlibras.gov.br/app");
    </script>
</body>
</html>
